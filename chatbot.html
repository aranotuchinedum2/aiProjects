<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoachAI — Your AI Fitness Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--accent); }
  .logo-sub { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .badge {
    margin-left: auto;
    background: var(--accent2);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .api-bar {
    width: 100%;
    max-width: 780px;
    margin: 20px auto 0;
    padding: 0 16px;
  }
  .api-bar label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
  .api-bar input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border 0.2s;
  }
  .api-bar input:focus { border-color: var(--accent); }

  .chat-wrapper {
    width: 100%;
    max-width: 780px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 16px;
  }

  #messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    min-height: 300px;
    max-height: 460px;
    padding-right: 4px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: var(--bg); }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .msg.bot .avatar { background: var(--accent); }
  .msg.user .avatar { background: var(--accent2); }
  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.bot .bubble { background: var(--card); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--accent); color: #000; font-weight: 500; border-top-right-radius: 4px; }

  .typing .bubble { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    align-items: flex-end;
  }
  #userInput {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    resize: none;
    max-height: 100px;
    min-height: 22px;
    line-height: 1.5;
  }
  #userInput::placeholder { color: var(--muted); }
  button#sendBtn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    width: 40px; height: 40px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  button#sendBtn:hover { transform: scale(1.08); background: #d4e800; }
  button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .starters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .starter-chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .starter-chip:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo-icon">💪</div>
  <div>
    <div class="logo-text">CoachAI</div>
    <div class="logo-sub">Powered by Claude</div>
  </div>
  <div class="badge">AI PROJECT</div>
</header>

<div class="api-bar">
  <label>Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
</div>

<div class="chat-wrapper">
  <div class="starters" id="starters">
    <div class="starter-chip" onclick="sendStarter(this)">🏋️ Build a 4-week workout plan</div>
    <div class="starter-chip" onclick="sendStarter(this)">🥗 High protein meal ideas</div>
    <div class="starter-chip" onclick="sendStarter(this)">😴 How much sleep do I need?</div>
    <div class="starter-chip" onclick="sendStarter(this)">💧 Daily water intake?</div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="avatar">💪</div>
      <div class="bubble">Yo! I'm Coach Rex — your no-excuses AI fitness coach. Ask me about workouts, nutrition, recovery, or building habits. Let's get to work. 🔥</div>
    </div>
  </div>

  <div class="input-row">
    <textarea id="userInput" placeholder="Ask your coach anything..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Coach Rex — a tough-love, high-energy fitness coach AI. You are motivating, direct, and knowledgeable about exercise science, nutrition, and recovery. 
- Keep responses concise and actionable (under 150 words unless asked for a plan)
- Use fitness terminology correctly
- Always end with one concrete action the user can take today
- Use occasional emojis to keep energy high
- Never give medical advice; redirect to doctors for injuries`;

const conversationHistory = [];

async function sendMessage(text) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Please enter your Anthropic API key above.'); return; }

  const input = document.getElementById('userInput');
  const msg = text || input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('starters').style.display = 'none';

  appendMessage('user', msg);
  conversationHistory.push({ role: 'user', content: msg });

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  const typingEl = appendTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    typingEl.remove();
    const reply = data.content?.[0]?.text || 'Something went wrong. Check your API key.';
    appendMessage('bot', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    typingEl.remove();
    appendMessage('bot', '⚠️ Error connecting. Check your API key and try again.');
  }
  btn.disabled = false;
}

function sendStarter(el) {
  const text = el.innerText.replace(/^[^\w]+/, '').trim();
  sendMessage(text);
}

function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'bot' ? '💪' : '🧑'}</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function appendTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = `<div class="avatar">💪</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

const input = document.getElementById('userInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
});
</script>
</body>
</html>
