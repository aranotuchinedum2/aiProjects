<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SentimentAI — Real-time Sentiment Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a12;
    --card: #111120;
    --border: #1e1e35;
    --text: #e8e8f8;
    --muted: #5a5a7a;
    --pos: #00e87a;
    --neg: #ff3b5c;
    --neu: #8b8bff;
    --mix: #ffb547;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 40px;
  }

  .hero {
    text-align: center;
    padding: 44px 20px 28px;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(139,139,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 { font-size: 42px; font-weight: 700; letter-spacing: -1px; }
  .hero h1 span { color: var(--neu); }
  .hero p { color: var(--muted); font-size: 14px; margin-top: 8px; letter-spacing: 0.5px; }

  .main { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 20px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .api-row { display: flex; flex-direction: column; gap: 6px; }
  .api-row label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .api-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }
  .api-row input:focus { border-color: var(--neu); }

  .input-section label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); display: block; margin-bottom: 10px; }
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: vertical;
    min-height: 120px;
    outline: none;
    line-height: 1.6;
    transition: border 0.2s;
  }
  textarea:focus { border-color: var(--neu); }
  textarea::placeholder { color: var(--muted); }

  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  .analyze-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--neu), #6060d0);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .analyze-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .examples-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    transition: all 0.2s;
  }
  .examples-btn:hover { border-color: var(--neu); color: var(--neu); }

  /* Result */
  .result-card {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .sentiment-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    border: 2px solid;
  }
  .badge-POSITIVE { color: var(--pos); border-color: var(--pos); background: rgba(0,232,122,0.08); }
  .badge-NEGATIVE { color: var(--neg); border-color: var(--neg); background: rgba(255,59,92,0.08); }
  .badge-NEUTRAL { color: var(--neu); border-color: var(--neu); background: rgba(139,139,255,0.08); }
  .badge-MIXED { color: var(--mix); border-color: var(--mix); background: rgba(255,181,71,0.08); }

  .score-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  @media(max-width: 500px) { .score-row { grid-template-columns: repeat(2, 1fr); } }
  .score-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .score-item .s-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .score-item .s-val { font-size: 22px; font-weight: 700; }
  .s-pos { color: var(--pos); }
  .s-neg { color: var(--neg); }
  .s-neu { color: var(--neu); }
  .s-mix { color: var(--mix); }

  .meter-row { margin-bottom: 16px; }
  .meter-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .meter-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .meter-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
  }

  .analysis-text {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  .analysis-text h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }

  .history-section { margin-top: 4px; }
  .history-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--muted); }
  .h-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .h-text { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }

  .copy-result-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    transition: all 0.2s;
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .copy-result-btn:hover { border-color: var(--neu); color: var(--neu); }
  .copy-result-btn.copied { border-color: var(--pos); color: var(--pos); }

  .pf-footer {
    width: 100%;
    text-align: center;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
  }
  .pf-footer a { color: inherit; text-decoration: none; transition: color 0.2s; }
  .pf-footer a:hover { color: var(--neu); }
  .pf-dot { opacity: 0.35; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="hero">
  <h1>Sentiment<span>AI</span></h1>
  <p>Analyze text emotions instantly · Powered by Claude API</p>
</div>

<div class="main">

  <div class="card api-row">
    <label>Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />
  </div>

  <div class="card input-section">
    <label>Text to Analyze</label>
    <textarea id="inputText" placeholder="Paste a review, tweet, comment, or any text here..."></textarea>
    <div class="btn-row">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyze Sentiment →</button>
      <button class="examples-btn" onclick="loadExample()">Try Example</button>
    </div>
  </div>

  <div class="card result-card" id="resultCard">
    <div id="badge"></div>
    <div class="score-row" id="scoreRow"></div>
    <div class="meter-row" id="meterRow"></div>
    <div class="analysis-text" id="analysisText">
      <h4>AI Explanation</h4>
      <div id="explanationText"></div>
    </div>
    <div style="text-align:right">
      <button class="copy-result-btn" id="copyResultBtn" onclick="copyResult()" style="display:none">📋 Copy Result</button>
    </div>
  </div>

  <div class="card history-section" id="historySection" style="display:none;">
    <h3>Recent Analyses</h3>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<footer class="pf-footer">
  <span>Chinedum Aranotu · 2026</span>
  <span class="pf-dot">·</span>
  <a href="https://github.com/aranotuchinedum2" target="_blank" rel="noopener">github.com/aranotuchinedum2</a>
</footer>

<script>
// This app was built by CeeJay for Chinedum Aranotu – 2026
const EXAMPLES = [
  "This product is absolutely amazing! Best purchase I've made all year. The quality is outstanding and delivery was super fast.",
  "Terrible customer service. Waited 3 weeks for a broken item. Completely unacceptable. Never buying again.",
  "The package arrived on time. The product works as described.",
  "I love the design but the battery life is disappointing. Mixed feelings overall.",
  "This restaurant is just okay. Nothing special but nothing bad either. I've had better, I've had worse."
];
let exIdx = 0;
const history = [];
let lastResult = null;

const COLORS = { POSITIVE: 'var(--pos)', NEGATIVE: 'var(--neg)', NEUTRAL: 'var(--neu)', MIXED: 'var(--mix)' };
const EMOJIS = { POSITIVE: '😊', NEGATIVE: '😠', NEUTRAL: '😐', MIXED: '🤔' };

function loadExample() {
  document.getElementById('inputText').value = EXAMPLES[exIdx % EXAMPLES.length];
  exIdx++;
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Enter your Anthropic API key first.'); return; }
  const text = document.getElementById('inputText').value.trim();
  if (!text) { alert('Enter some text to analyze.'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analyzing...';

  const PROMPT = `Analyze the sentiment of the following text. Respond ONLY with a JSON object, no markdown, no explanation outside the JSON.

JSON format:
{
  "sentiment": "POSITIVE" | "NEGATIVE" | "NEUTRAL" | "MIXED",
  "scores": {
    "positive": <0-100>,
    "negative": <0-100>,
    "neutral": <0-100>,
    "mixed": <0-100>
  },
  "confidence": <0-100>,
  "explanation": "<2-3 sentence explanation of why this sentiment was detected, citing specific words or phrases>"
}

Text: "${text}"`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: PROMPT }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'API error');
    const raw = data.content?.[0]?.text || '';
    const json = JSON.parse(raw.replace(/```json|```/g, '').trim());
    lastResult = { ...json, text };
    renderResult(json, text);
  } catch(e) {
    alert(`Error: ${e.message}. Check your API key or try again.`);
    console.error(e);
  }
  btn.disabled = false;
  btn.innerHTML = 'Analyze Sentiment →';
}

function copyResult() {
  if (!lastResult) return;
  const r = lastResult;
  const text = `SENTIMENT: ${r.sentiment} (${r.confidence}% confident)\n\nScores: Positive ${r.scores.positive}% · Negative ${r.scores.negative}% · Neutral ${r.scores.neutral}% · Mixed ${r.scores.mixed}%\n\nExplanation: ${r.explanation}\n\nAnalyzed text: "${r.text}"`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyResultBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy Result'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderResult(r, text) {
  const card = document.getElementById('resultCard');
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  document.getElementById('badge').innerHTML = `
    <div class="sentiment-badge badge-${r.sentiment}">
      ${EMOJIS[r.sentiment]} ${r.sentiment}
      <span style="font-size:13px;font-weight:400;opacity:0.7">${r.confidence}% confident</span>
    </div>`;

  const scoreKeys = ['positive','negative','neutral','mixed'];
  const classes = ['s-pos','s-neg','s-neu','s-mix'];
  document.getElementById('scoreRow').innerHTML = scoreKeys.map((k, i) => `
    <div class="score-item">
      <div class="s-label">${k}</div>
      <div class="s-val ${classes[i]}">${r.scores[k]}</div>
    </div>`).join('');

  const meterColors = [COLORS.POSITIVE, COLORS.NEGATIVE, COLORS.NEUTRAL, COLORS.MIXED];
  document.getElementById('meterRow').innerHTML = scoreKeys.map((k, i) => `
    <div>
      <div class="meter-label"><span>${k}</span><span>${r.scores[k]}%</span></div>
      <div class="meter-track">
        <div class="meter-fill" style="width:0%;background:${meterColors[i]}" data-target="${r.scores[k]}"></div>
      </div>
    </div>`).join('');
  setTimeout(() => {
    document.querySelectorAll('.meter-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  }, 50);

  document.getElementById('explanationText').textContent = r.explanation;
  document.getElementById('copyResultBtn').style.display = 'inline-flex';

  // History — use index to avoid XSS; store full text in array
  history.unshift({ text: text.slice(0, 60) + (text.length > 60 ? '…' : ''), full: text, sentiment: r.sentiment });
  if (history.length > 5) history.pop();

  const histSection = document.getElementById('historySection');
  histSection.style.display = 'block';
  const histList = document.getElementById('historyList');
  histList.innerHTML = '';
  history.forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="h-dot" style="background:${COLORS[h.sentiment]}"></div>
      <div class="h-text"></div>
      <div class="h-badge" style="background:${COLORS[h.sentiment]}22;color:${COLORS[h.sentiment]}">${h.sentiment}</div>`;
    item.querySelector('.h-text').textContent = h.text;
    item.addEventListener('click', () => {
      document.getElementById('inputText').value = h.full;
    });
    histList.appendChild(item);
  });
}
</script>
</body>
</html>
